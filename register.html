<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Swap-Skill-register</title>
    <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css" rel="stylesheet"/>
    <style>
        body {
            background-image: url('img/background.jpg');
            background-size: cover;
            background-position: center;
        }
        .login-container {
            background: rgba(0, 0, 0, 0.8);
            padding: 2rem;
            border-radius: 4rem;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.6);
            max-width: 5000px;
            margin-left: 15rem;
        }
        .login-container img {
            height: 100px;
            width: auto;
        }
        .login-container h1, .login-container p, .login-container h2 {
            color: white;
        }
        .login-container .form-control {
            background-color: #e2e2e2;
        }
        .login-container .btn-red {
            background-color: #dc3545;
            color: white;
        }
        .login-container .btn-blue {
            background-color: #007bff;
            color: white;
        }
        .btn-red:hover {
            background-color:blue; /* Darker red on hover */
        }
        .btn-blue:hover {
            background-color: #2c973e; /* Darker blue on hover */
        }
    </style>
</head>
<body class="d-flex align-items-center min-vh-100">
    <div class="login-container">
        <div class="text-center mb-4">
            <img src="img/favicon.ico" alt="University Logo">
            <div>
                <h1 class="h3 font-weight-bold">Swap Skill</h1>
                <p class="small">E Learning Platform</p>
                <h1 class="h2 font-weight-bold mt-4">Register Your Self</h1>
                <p class="text-muted mt-2 mb-4">Join the Swap-Skill Family, where learning and growth come together in an inspiring way.</p>
            </div>
        </div>
        <form>
            <div class="form-group">
                <input type="text" class="form-control form-control-lg mb-3" placeholder="Enter Your Name.." required>
            </div>
            <div class="form-group">
                <input type="email" class="form-control form-control-lg mb-3" placeholder="Enter Your Email.." required>
            </div>
            <div class="form-group">
                <input type="number" class="form-control form-control-lg mb-3" placeholder="Enter Your Phone Number.." required>
            </div>
            <div class="form-group">
                <input type="password" class="form-control form-control-lg mb-3" placeholder="Enter Your Password.." required>
            </div>
            <div class="form-group">
                <input type="date" class="form-control form-control-lg mb-3" placeholder="Enter Your Date of Birth.." required>
            </div>
            <div class="form-group">
                <input type="text" class="form-control form-control-lg mb-3" placeholder="Enter Your Occupation.." required>
            </div>
            <div class="form-group">
                <select class="form-control form-control-lg mb-3" required>
                    <option value="" disabled selected>Select Your Country</option>
                    <option value="male">INDIA</option>
                    <option value="female">SHRILANKA</option>
                    <option value="other">ENGLAND</option>
                    <option value="other">PAKISTAN</option>
                </select>
            </div>
            <div class="form-group">
                <select class="form-control form-control-lg mb-3" required>
                    <option value="" disabled selected>Select Your Gender</option>
                    <option value="male">Male</option>
                    <option value="female">Female</option>
                    <option value="other">Other</option>
                </select>
            </div>
            <div class="form-group">
                <select class="form-control form-control-lg mb-3" required>
                    <option value="" disabled selected>Select Your Role</option>
                    <option value="learner">Learner</option>
                    <option value="educator">Educator</option>
                </select>
            </div>
            <button type="submit" class="btn btn-primary btn-lg btn-block rounded-pill">REGISTER</button>
        </form>
        
    </div>
    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.5.4/dist/umd/popper.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
<script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
</body>

</html>
