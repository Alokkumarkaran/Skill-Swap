<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Swap-Skill-joinus</title>
    <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css" rel="stylesheet"/>
    <style>
        body {
            background-image: url('img/background.jpg');
            background-size: cover;
            background-position: center;
        }
        .login-container {
            background: rgba(0, 0, 0, 0.8);
            padding: 2rem;
            border-radius: 5rem;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.6);
            max-width: 550px;
            margin-left: 15rem;
        }
        .login-container img {
            height: 100px;
            width: auto;
        }
        .login-container h1, .login-container p, .login-container h2 {
            color: white;
        }
        .login-container .form-control {
            background-color: #e2e2e2;
        }
        .login-container .btn-red {
            background-color: #dc3545;
            color: white;
        }
        .login-container .btn-blue {
            background-color: #007bff;
            color: white;
        }
        .btn-red:hover {
            background-color:blue; /* Darker red on hover */
        }
        .btn-blue:hover {
            background-color: #2c973e; /* Darker blue on hover */
        }
    </style>
</head>
<body class="d-flex align-items-center min-vh-100">
    <div class="login-container">
        <div class="text-center mb-4">
            <img src="img/favicon.ico" alt="University Logo">
            <div>
                <h1 class="h3 font-weight-bold">Swap Skill</h1>
                <p class="small">E Learning Platform</p>
            </div>
        </div>
        <h1 class="h1 text-center mb-4">Log in</h1>
        <p class="text-center text-light mb-4">Welcome to the Swap-Skill Family, where learning and growth come together in an inspiring</p>
        <input type="text" class="form-control form-control-lg mb-3 " placeholder="Enter Email...">
        <input type="password" class="form-control form-control-lg mb-3" placeholder="Enter Password...">
        <button class="btn btn-red btn-lg btn-block mb-3 rounded-pill" onclick="handleSubmit()">NEXT</button>
        <p class="text-center text-light mb-3">OR</p>
        <button class="btn btn-blue btn-lg btn-block rounded-pill" onclick="redirectToRegistration()">CLICK HERE FOR REGISTRATION</button>
    </div>
    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.5.4/dist/umd/popper.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
    <script>
        function handleSubmit() {
            var emailInput = document.getElementById('emailInput').value;
            
            if (emailInput.trim() !== '') {
                // Redirect to another page if the input value is not empty
                window.location.href = 'Learners.html'; // Replace with your target URL
            } else {
                alert('Please enter a valid email address.'); // Alert if input is empty
            }
        }
        function redirectToRegistration() {
            window.location.href = 'register.html'; // Replace with your target URL
        }
    </script>
</body>

</html>
